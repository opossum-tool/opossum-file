repos:
  - repo: local
    hooks:
      - id: ruff
        name: ruff
        entry: uv run ruff check
        language: system
        types: [python]
        pass_filenames: true
      - id: ruff-format
        name: ruff-format
        entry: uv run ruff format --check
        language: system
        types: [python]
        pass_filenames: true
      - id: mypy
        name: mypy
        entry: uv run mypy
        language: system
        types: [python]
        pass_filenames: false
        args: ["src/", "tests/"]
      - id: mdformat
        name: mdformat
        entry: uv run mdformat
        language: system
        types: [markdown]
        pass_filenames: true
      - id: reuse
        name: reuse
        entry: uv run reuse lint
        language: system
        pass_filenames: false
